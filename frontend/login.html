<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Fast Good</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/webp" href="./src/assets/img/logo.webp">
  <link rel="stylesheet" href="./src/css/global.css">
  <style>
    body {
      background: var(--color-bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: var(--color-white);
      padding: 3rem 2rem;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 420px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2.5rem;
      border-bottom: 3px solid var(--color-primary);
      padding-bottom: 1.5rem;
    }

    .login-header img {
      height: 70px;
      margin-bottom: 1rem;
    }

    .login-header h1 {
      font-size: 2rem;
      color: var(--color-primary);
      margin-bottom: 0.5rem;
    }

    .login-header p {
      color: var(--color-muted);
      font-size: 0.95rem;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--color-text);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.85rem;
      border: 2px solid #e0e0e0;
      border-radius: var(--radius-sm);
      font-family: var(--font-main);
      font-size: 1rem;
      transition: border-color var(--transition-fast);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 0.9rem;
      background: var(--color-secondary);
      color: var(--color-white);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .login-btn:hover {
      background: #e08700;
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .error-message {
      color: #d32f2f;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
      padding: 0.5rem;
      background: #ffebee;
      border-left: 3px solid #d32f2f;
      border-radius: var(--radius-sm);
    }

    .error-message.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: var(--color-primary);
      font-weight: 600;
      margin-top: 1rem;
    }

    .loading.show {
      display: block;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-header">
      <img src="src/assets/img/logo.webp" alt="Fast Good Logo" />
      <h1>FAST GOOD</h1>
      <p>Panel de Control</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">👤 Usuario</label>
        <input type="text" id="username" name="username" required placeholder="lucas" />
        <div class="error-message" id="usernameError"></div>
      </div>

      <div class="form-group">
        <label for="password">🔐 Contraseña</label>
        <input type="password" id="password" name="password" required placeholder="••••••••" />
        <div class="error-message" id="passwordError"></div>
      </div>

      <div class="error-message" id="loginError"></div>
      <div class="loading" id="loadingSpinner">Iniciando sesión...</div>

      <button type="submit" class="login-btn">Iniciar Sesión</button>
    </form>
  </div>

  <script src="src/js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', manejarLogin);
  </script>
</body>

</html>
