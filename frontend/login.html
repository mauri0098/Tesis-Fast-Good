<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Fast Good</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/webp" href="./src/assets/img/logo.webp">
  
  <link rel="stylesheet" href="./src/css/global.css">
  <link rel="stylesheet" href="./src/css/login.css">
</head>

<body>
  <div class="login-container">
    <div class="login-header">
      <img src="src/assets/img/logo.webp" alt="Fast Good Logo" />
      <h1>FAST GOOD</h1>
      <p>Panel de Control</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">👤 Usuario</label>
        <input type="text" id="username" name="username" required placeholder="lucas" />
        <div class="error-message" id="usernameError"></div>
      </div>

      <div class="form-group">
        <label for="password">🔐 Contraseña</label>
        <input type="password" id="password" name="password" required placeholder="••••••••" />
        <div class="error-message" id="passwordError"></div>
      </div>

      <div class="error-message" id="loginError"></div>
      <div class="loading" id="loadingSpinner">Iniciando sesión...</div>

      <button type="submit" class="login-btn">Iniciar Sesión</button>
    </form>
  </div>

  <script src="src/js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', manejarLogin);
  </script>
</body>

</html>
