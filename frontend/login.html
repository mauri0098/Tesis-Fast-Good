<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión - Fast Good</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/webp" href="./src/assets/img/logo.webp">

  <link rel="stylesheet" href="./src/css/global.css">
  <link rel="stylesheet" href="./src/css/login.css">
</head>

<body>
  <div class="login-container">
    <div class="login-header">
      <img src="src/assets/img/logo.webp" alt="Fast Good Logo" />
      <h1>FAST GOOD</h1>
      <p>Bienvenido</p>
    </div>

    <!-- Tabs -->
    <div class="tab-buttons">
      <button class="tab-btn active" id="tabLogin" onclick="mostrarTab('login')">Iniciar Sesión</button>
      <button class="tab-btn" id="tabRegistro" onclick="mostrarTab('registro')">Crear Cuenta</button>
    </div>

    <!-- FORMULARIO LOGIN -->
    <div id="seccionLogin">
      <form id="loginForm">
        <div class="form-group">
          <label for="username">👤 Usuario o Email</label>
          <input type="text" id="username" name="username" required placeholder="tu usuario o email" />
          <div class="error-message" id="usernameError"></div>
        </div>

        <div class="form-group">
          <label for="password">🔐 Contraseña</label>
          <input type="password" id="password" name="password" required placeholder="••••••••" />
          <div class="error-message" id="passwordError"></div>
        </div>

        <div class="error-message" id="loginError"></div>
        <div class="loading" id="loadingSpinner">Iniciando sesión...</div>

        <button type="submit" class="login-btn">Iniciar Sesión</button>
      </form>
    </div>

    <!-- FORMULARIO REGISTRO -->
    <div id="seccionRegistro" style="display: none;">
      <form id="registroForm">
        <div class="form-group">
          <label for="reg-nombre">Nombre</label>
          <input type="text" id="reg-nombre" required placeholder="Tu nombre" />
        </div>

        <div class="form-group">
          <label for="reg-apellido">Apellido</label>
          <input type="text" id="reg-apellido" required placeholder="Tu apellido" />
        </div>

        <div class="form-group">
          <label for="reg-direccion">Dirección</label>
          <input type="text" id="reg-direccion" required placeholder="Tu dirección" />
        </div>

        <div class="form-group">
          <label for="reg-telefono">Teléfono</label>
          <input type="tel" id="reg-telefono" required placeholder="Tu teléfono" />
        </div>

        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" required placeholder="tu@email.com" />
        </div>

        <div class="form-group">
          <label for="reg-password">Contraseña</label>
          <input type="password" id="reg-password" required placeholder="••••••••" minlength="6" />
        </div>

        <div class="error-message" id="registroError"></div>
        <div class="success-message" id="registroExito"></div>
        <div class="loading" id="loadingRegistro">Creando cuenta...</div>

        <button type="submit" class="login-btn">Crear Cuenta</button>
      </form>
    </div>
  </div>

  <script src="src/js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', manejarLogin);
    document.getElementById('registroForm').addEventListener('submit', manejarRegistro);

    function mostrarTab(tab) {
      const esLogin = tab === 'login';
      document.getElementById('tabLogin').classList.toggle('active', esLogin);
      document.getElementById('tabRegistro').classList.toggle('active', !esLogin);
      document.getElementById('seccionLogin').style.display = esLogin ? 'block' : 'none';
      document.getElementById('seccionRegistro').style.display = esLogin ? 'none' : 'block';
    }
  </script>
</body>

</html>
