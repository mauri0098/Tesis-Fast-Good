<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast Good — Stock</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../src/css/global.css">
  <link rel="stylesheet" href="../src/css/stock.css">
</head>

<body>

  <header>
    <div class="container-centrado">
      <div style="display:flex; align-items:center; gap:1rem;">
        <img src="../src/assets/img/logo.webp" alt="Fast Good" style="height:40px; border-radius:4px;" onerror="this.style.display='none'">
        <h1>Gestión de Stock</h1>
      </div>
      <nav>
        <a href="../admin.html">Volver al Panel</a>
      </nav>
    </div>
  </header>

  <main class="page-container">
    <div class="table-wrapper">

      <div class="tabla-header">
        <div class="filtros-container">
          <input type="text" id="filtroNombre" class="filtro-input" placeholder="Buscar por nombre...">
          <select id="filtroCategoria" class="filtro-input">
            <option value="">Todas las categorías</option>
          </select>
          <select id="filtroEstado" class="filtro-input">
            <option value="">Todos los estados</option>
            <option value="Normal">Normal</option>
            <option value="Bajo mínimo">Bajo mínimo</option>
          </select>
        </div>
        <button class="btn-nuevo-insumo" onclick="abrirModalNuevoInsumo()">+ Incorporar nuevo insumo</button>
      </div>

      <table class="standard-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Stock actual</th>
            <th>Unidad</th>
            <th>Categoría</th>
            <th>Fecha caducidad</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="stockBody">
          <tr>
            <td colspan="7" class="loading-text">Cargando datos...</td>
          </tr>
        </tbody>
      </table>

    </div>
  </main>

  <footer>
    <p>&copy; 2024 Fast Good - Panel de Administración</p>
  </footer>

  <!-- MODAL: Incorporar nuevo insumo -->
  <div id="modalNuevoInsumo" class="modal">
    <div class="modal-content modal-stock">
      <span class="close" onclick="cerrarModalNuevoInsumo()">&times;</span>
      <h3>Incorporar nuevo insumo</h3>

      <div class="modal-grid">
        <label>Nombre *</label>
        <input id="niNombre" type="text" placeholder="Ej: Avena">

        <label>Stock mínimo *</label>
        <input id="niStockMinimo" type="number" min="0" step="0.01" placeholder="Ej: 5">

        <label>Unidad *</label>
        <select id="niUnidad">
          <option value="">Seleccione...</option>
          <option value="kg">kg (kilogramos)</option>
          <option value="g">g (gramos)</option>
          <option value="lts">lts (litros)</option>
          <option value="ml">ml (mililitros)</option>
          <option value="u">u (unidades)</option>
        </select>

        <label>Categoría *</label>
        <select id="niCategoria">
          <option value="">Cargando categorías...</option>
        </select>
      </div>

      <div id="niError" class="modal-error">Completá todos los campos obligatorios.</div>

      <div class="modal-actions">
        <button class="btn-cancelar" onclick="cerrarModalNuevoInsumo()">Cancelar</button>
        <button class="btn-confirmar" onclick="confirmarNuevoInsumo()">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="../src/js/stock.js"></script>
</body>

</html>
