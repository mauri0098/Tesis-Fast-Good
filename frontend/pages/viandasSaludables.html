<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viandas Saludables - Fast Good</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="../src/assets/img/logo.webp" type="image/webp" />
  <!-- CSS Global (Fuente de Verdad) -->
  <link rel="stylesheet" href="../src/css/global.css" />
  <!-- CSS del Carrito -->
  <link rel="stylesheet" href="../src/css/carrito.css" />
  <!-- CSS específico de la página -->
  <link rel="stylesheet" href="../src/css/viandasSaludables.css" />
</head>

<body>

  <!-- Carrito Lateral -->
  <div id="carrito" class="carrito-lateral">
    <h3>🛒 Tu Carrito</h3>
    <ul id="carrito-items" style="list-style: none; padding: 0; margin-top: 1rem;"></ul>
    <button onclick="confirmarPedido()" class="btn-cerrar-carrito" style="background-color: #2196F3;">Confirmar
      Pedido</button>
    <button onclick="cerrarCarrito()" class="btn-cerrar-carrito">Cerrar</button>
  </div>

  <header>
    <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
      <!-- LOGO -->
      <div style="display: flex; align-items: center;">
        <img src="../src/assets/img/logo.webp" alt="Fast Good Logo" style="height: 50px; margin-right: 1rem;" />
        <h1 style="margin: 0;">FAST GOOD</h1>
      </div>

      <!-- NAV + CARRITO -->
      <nav style="display: flex; align-items: center; gap: 2rem;">
        <a href="../index.html">Inicio</a>

        <!-- Ícono del carrito -->
        <div id="carrito-icono" style="position: relative; cursor: pointer;" onclick="toggleCarrito()">
          <img src="https://cdn-icons-png.flaticon.com/512/107/107831.png" alt="Carrito" style="height: 28px;" />
          <span id="cart-count"
            style="position: absolute; top: -8px; right: -8px; background: red; color: white; font-size: 12px; padding: 2px 6px; border-radius: 50%;">0</span>
        </div>
      </nav>
    </div>
  </header>

  <section class="section" id="seccion-catalogo">
    <h2 id="titulo-catalogo">Nuestras Categorías</h2>

    <nav id="breadcrumb" class="breadcrumb" aria-label="Navegación del catálogo"></nav>

    <div class="buscador-container" id="buscador-container" style="display: none;">
      <input type="text" id="buscador-productos" class="buscador"
             placeholder="Buscar producto..." autocomplete="off" />
    </div>

    <p id="cargando-catalogo" class="cargando-texto" style="display: none;">Cargando...</p>

    <div id="contenedor-catalogo"></div>
  </section>

  <footer id="contacto">
    <p>&copy; 2025 Fast Good - Viandas Saludables </p>
  </footer>

  <!-- SCRIPTS (orden: global → funciones → productos → carrito → página) -->
  <script src="../src/js/global.js"></script>
  <script src="../src/js/funciones.js"></script>
  <script src="../src/js/productos.js"></script>
  <script src="../src/js/carrito.js"></script>
  <script src="../src/js/viandasSaludables.js"></script>
</body>

</html>
