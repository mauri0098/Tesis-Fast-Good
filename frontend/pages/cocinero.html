<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fast Good - Tareas de Cocina</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>

<body>

      <thead>
        <tr>
          <th>N° Pedido</th>
          <th>Fecha</th>
          <th>Plato</th>

          <th>Observaciones</th>

      </thead>
      <tbody id="tablaTareas">
        <tr><td colspan="6" class="loading-text">Cargando tareas...</td></tr>

<footer>
