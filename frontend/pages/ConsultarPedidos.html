<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesis - Consultar Pedidos</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../src/css/global.css">
  <link rel="stylesheet" href="../src/css/ConsultarPedidos.css">
</head>

<body>

  <header>
    <div class="container-centrado">
      <div style="display:flex; align-items:center; gap:1rem;">
        <img src="../src/assets/img/logo.webp" alt="Fast Good" style="height:50px; border-radius:4px;" onerror="this.style.display='none'">
        <h1>Administración de Pedidos</h1>
      </div>
      <nav>
        <a href="../admin.html">Volver al Panel</a>
      </nav>
    </div>
  </header>

  <main class="page-container">
    <div class="table-wrapper">
      <div class="filtros-container">
        <input type="text"  id="CampoBusqueda" class="filtro-input" placeholder="Buscar por nombre o N° pedido...">
        <input type="date"  id="FechaDesde"    class="filtro-input filtro-fecha">
        <input type="date"  id="FechaHasta"    class="filtro-input filtro-fecha">
      </div>
      <table class="standard-table">
        <thead>
          <tr>
            <th>N° Pedido</th>
            <th>Fecha</th>
            <th>Cliente</th>
            <th>Dirección</th>
            <th>Teléfono</th>
            <th>Mail</th>
            <th>Viandas</th>
            <th>Costo</th>
            <th>Estado</th>
            <th>Método Pago</th>
          </tr>
        </thead>
        <tbody id="pedidosBody">
          <!-- JS Render -->
          <tr>
            <td colspan="10" class="loading-text">Cargando datos...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <footer>
    <p>&copy; 2024 Fast Good - Panel de Administración Tesis</p>
  </footer>

  <script src="../src/js/global.js"></script>
  <script src="../src/js/ListarPedidos.js"></script>
</body>

</html>
