<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast Good — Gestionar Recetas</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../src/css/global.css">
  <link rel="stylesheet" href="../src/css/generarReceta.css">
</head>

<body>

  <header>
    <div class="container-centrado">
      <div style="display:flex; align-items:center; gap:1rem;">
        <img src="../src/assets/img/logo.webp" alt="Fast Good" style="height:40px; border-radius:4px;" onerror="this.style.display='none'">
        <h1>Gestionar Recetas</h1>
      </div>
      <nav>
        <a href="../admin.html">Volver al Panel</a>
      </nav>
    </div>
  </header>

  <main class="page-container">
    <div class="table-wrapper">

      <div class="tabla-header">
        <div class="filtros-container">
          <input type="text" id="filtroNombre" class="filtro-input" placeholder="Buscar por producto...">
          <select id="filtroPlan" class="filtro-input">
            <option value="">Todos los planes</option>
          </select>
        </div>
        <button class="btn-agregar" onclick="abrirModalNuevaReceta()">+ Nueva Receta</button>
      </div>

      <table class="standard-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Plan</th>
            <th>Nombre Producto</th>
            <th>Receta</th>
            <th>Cant. Posible</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="recetasBody">
          <tr>
            <td colspan="6" class="loading-text">Cargando datos...</td>
          </tr>
        </tbody>
      </table>

    </div>
  </main>

  <footer>
    <p>&copy; 2025 Fast Good - Panel de Administración</p>
  </footer>

  <!-- MODAL: Detalles de Receta -->
  <div id="modalDetalles" class="modal">
    <div class="modal-content modal-receta">
      <span class="close" onclick="cerrarModalDetalles()">&times;</span>
      <h3 id="detTitulo">Detalles de Receta</h3>

      <div class="det-info">
        <div class="det-fila"><strong>Producto:</strong> <span id="detProducto"></span></div>
        <div class="det-fila"><strong>Plan:</strong> <span id="detPlan"></span></div>
        <div class="det-fila"><strong>Cant. posible:</strong> <span id="detPosible"></span></div>
      </div>

      <table class="table-insumos">
        <thead>
          <tr>
            <th>Insumo</th>
            <th>Cantidad</th>
            <th>Unidad</th>
          </tr>
        </thead>
        <tbody id="detInsumosBody"></tbody>
      </table>

      <div class="modal-actions">
        <button class="btn-cancelar" onclick="cerrarModalDetalles()">Cerrar</button>
        <button class="btn-confirmar" id="btnEditarDesdeDetalles">Editar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Nueva / Editar Receta -->
  <div id="modalEditar" class="modal">
    <div class="modal-content modal-receta">
      <span class="close" onclick="cerrarModalEditar()">&times;</span>
      <h3 id="edTitulo">Nueva Receta</h3>

      <div class="modal-grid">
        <label>Producto*</label>
        <select id="edProducto">
          <option value="">Cargando productos...</option>
        </select>
      </div>

      <table class="table-insumos">
        <thead>
          <tr>
            <th>Insumo</th>
            <th>Cantidad</th>
            <th>Unidad</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="edInsumosBody"></tbody>
      </table>

      <div class="ed-agregar-fila">
        <button class="btn-agregar-insumo" onclick="agregarFilaInsumo(null)">+ Agregar insumo</button>
      </div>

      <div id="edError" class="modal-error">Completá todos los campos.</div>

      <div class="modal-actions">
        <button class="btn-cancelar" onclick="cerrarModalEditar()">Cancelar</button>
        <button class="btn-confirmar" onclick="guardarReceta()">Guardar</button>
      </div>
    </div>
  </div>

  <script src="../src/js/generarReceta.js"></script>

</body>

</html>
